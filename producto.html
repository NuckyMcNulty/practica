<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producto · Mi sitio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

  <header class="bg-white border-bottom sticky-top">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h1 class="h4 m-0">Mi sitio</h1>
      <nav class="d-flex gap-3">
        <a href="tienda.html">Tienda</a>
        <a href="contact.html">Contacto</a>
        <a href="index.html">Inicio</a>
        <a href="about.html">Descubrir</a>
        <a href="carrito.html">Carrito</a>
        <a href="auth.html">Iniciar sesión</a>
      </nav>
    </div>
  </header>

  <main class="container py-5">
    <div id="status" class="mb-3"></div>
    <section id="productDetail" class="bg-white p-4 rounded-4 shadow-sm mb-4"></section>

    <section class="bg-white p-4 rounded-4 shadow-sm mb-4">
      <h3 class="h5 mb-3">Agregar review</h3>
      <form id="reviewForm" class="row g-3">
        <div class="col-12 col-md-4">
          <label class="form-label">Nombre</label>
          <input class="form-control" type="text" name="nombre" required>
        </div>
        <div class="col-12 col-md-8">
          <label class="form-label">Review</label>
          <input class="form-control" type="text" name="mensaje" required>
        </div>
        <div class="col-12">
          <button class="btn btn-success" type="submit">Enviar review</button>
        </div>
      </form>
      <div id="reviewStatus" class="mt-3"></div>
    </section>

    <section class="bg-white p-4 rounded-4 shadow-sm">
      <h3 class="h5 mb-3">Reviews</h3>
      <div id="reviewsList"></div>
    </section>
  </main>

  <footer class="bg-white border-top">
    <div class="container py-3 text-center text-muted">
      <small>© 2026 · Mi sitio</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/producto.js"></script>

  <!-- =====================================================
       THREE.JS — visor embebido
  ====================================================== -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Setup — lo creamos una vez, lo reutilizamos
    const scene    = new THREE.Scene();
    scene.background = new THREE.Color(0xf6f7fb);

    const camera   = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    let controls = null;
    let modeloCargado = false;

    // Luces
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const luzPrincipal = new THREE.DirectionalLight(0xffffff, 3);
    luzPrincipal.position.set(5, 8, 5);
    scene.add(luzPrincipal);
    const luzRelleno = new THREE.DirectionalLight(0xffffff, 1);
    luzRelleno.position.set(-5, -3, -3);
    scene.add(luzRelleno);

    // Loop
    (function animar() {
      requestAnimationFrame(animar);
      controls?.update();
      renderer.render(scene, camera);
    })();

    // =====================================================
    // mostrarImagen — vuelve a la foto del producto
    // Estas funciones se llaman desde el onclick del HTML
    // =====================================================
    window.mostrarImagen = () => {
      const wrap   = document.getElementById('visor3d-wrap');
      const img    = document.getElementById('product-img');
      const btn3d  = document.getElementById('btn-3d');
      const btnImg = document.getElementById('btn-imagen');

      if (wrap) wrap.style.display = 'none';
      if (img)  img.style.display  = 'block';

      btnImg?.classList.replace('btn-outline-dark', 'btn-dark');
      btn3d?.classList.replace('btn-dark', 'btn-outline-dark');
    };

    // =====================================================
    // mostrar3D — oculta la imagen e inyecta el canvas 3D
    // =====================================================
    window.mostrar3D = (rutaModelo) => {
      const wrap     = document.getElementById('visor3d-wrap');
      const img      = document.getElementById('product-img');
      const loader3d = document.getElementById('visor3d-loader');
      const btn3d    = document.getElementById('btn-3d');
      const btnImg   = document.getElementById('btn-imagen');
      const mediaWrap = document.getElementById('media-wrap');

      // Ocultamos la imagen y mostramos el visor
      if (img)  img.style.display  = 'none';
      if (wrap) wrap.style.display = 'block';

      btnImg?.classList.replace('btn-dark', 'btn-outline-dark');
      btn3d?.classList.replace('btn-outline-dark', 'btn-dark');

      // Inyectamos el canvas en el visor (solo la primera vez)
      if (!wrap.contains(renderer.domElement)) {
        wrap.appendChild(renderer.domElement);
      }

      // Ajustamos tamaño del renderer al contenedor
      const w = mediaWrap.clientWidth;
      const h = mediaWrap.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();

      // OrbitControls apuntando al canvas del visor
      if (!controls) {
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
      }

      // Cargamos el modelo solo la primera vez
      if (modeloCargado) return;
      modeloCargado = true;

      new GLTFLoader().load(
        './' + rutaModelo,
        (gltf) => {
          const modelo = gltf.scene;

          // Centrar y escalar
          const caja   = new THREE.Box3().setFromObject(modelo);
          const centro = new THREE.Vector3();
          const tamaño = new THREE.Vector3();
          caja.getCenter(centro);
          caja.getSize(tamaño);
          modelo.position.sub(centro);
          modelo.scale.setScalar(3 / tamaño.length());

          // Posicionar cámara después de escalar — 3 es el tamaño normalizado
          const dist = 3 * 1.8;
          camera.position.set(0, 0, dist);
          controls.target.set(0, 0, 0);
          controls.update();

          scene.add(modelo);

          if (loader3d) {
            loader3d.style.opacity = '0';
            setTimeout(() => loader3d.style.display = 'none', 400);
          }
        },
        null,
        (err) => {
          console.error(err);
          if (loader3d) loader3d.textContent = 'No se pudo cargar el modelo.';
        }
      );
    };

  </script>

</body>
</html>

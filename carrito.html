<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La Cosecha · Robert Eggers</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <header class="sticky-top">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <a href="index.html" class="h4 m-0 text-decoration-none" style="font-family:'Cinzel', serif; color: var(--text); letter-spacing: 0.15em;">EGGERS</a>

      <nav class="d-flex gap-2">
        <a href="index.html">Inicio</a>
        <a href="about.html">Biografía</a>
        <a href="tienda.html">Películas</a>
        <a href="contact.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="container py-5">
    <section class="shadow-sm p-4 p-md-5">
      
      <div class="mb-5 border-bottom pb-4" style="border-color: var(--border) !important;">
        <h2 class="mb-2">Tu Cosecha</h2>
        <div id="cartStatus" style="font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;"></div>
      </div>

      <div id="cartList" class="d-flex flex-column gap-3"></div>

    </section>
  </main>

  <footer>
    <div class="container py-4 text-center">
      <small>© 2026 · Robert Eggers Archive. Manifiesto de Adquisiciones Físicas.</small>
    </div>
  </footer>

  <script type="module">
    import { listenUserCart } from "./js/carrito.js";

    const list = document.getElementById("cartList");
    const status = document.getElementById("cartStatus");

    listenUserCart((items) => {
      if (items.length === 0) {
        status.innerHTML = `// El altar de recolección está vacío`;
        list.innerHTML = `
          <div class="text-center py-5" style="border: 1px dashed var(--border); border-radius: var(--radius);">
            <p class="mb-0" style="font-family: 'Cinzel', serif; color: var(--muted); letter-spacing: 0.05em;">
              NO HAS RECLAMADO NINGUNA COPIA DE ARCHIVO O MANUSCRITO TODAVÍA.
            </p>
          </div>
        `;
        return;
      }

      // Conteo de elementos solemne
      status.innerHTML = `Unidades reclamadas para la cosecha: ${items.length}`;

      // Inyección de HTML dinámico respetando tus variables de CSS oscuro
      list.innerHTML = items.map(i => `
        <div class="d-flex justify-content-between align-items-center p-4" 
             style="background-color: var(--card); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color 0.3s ease;">
          <div>
            <h3 class="m-0 mb-1" style="font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--text); letter-spacing: 0.05em;">
              ${i.nombre}
            </h3>
            <span style="font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase;">
              [ Copia Verificada ]
            </span>
          </div>
          <div style="font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--text);">
            $${i.precio}
          </div>
        </div>
      `).join("");
      
      // Añadir interactividad estética a los elementos inyectados
      document.querySelectorAll('#cartList > div').forEach(el => {
        el.addEventListener('mouseenter', () => el.style.borderColor = 'var(--text)');
        el.addEventListener('mouseleave', () => el.style.borderColor = 'var(--border)');
      });
    });
  </script>

</body>
</html>

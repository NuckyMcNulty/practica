<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Mi sitio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-light">

  <header class="bg-white border-bottom sticky-top">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h1 class="h4 m-0">GdT<span class="badge text-bg-danger ms-2" style="font-size:11px;">Admin</span></h1>
      <nav class="d-flex gap-3 align-items-center">
        <a href="about.html">Biografía</a>
        <a href="tienda.html">Películas</a>
        <a href="contact.html">Contacto</a>
        <a href="index.html">Inicio</a>
        <a href="carrito.html">Carrito</a>
        <a href="auth.html">Iniciar sesión</a>
        <span id="nav-usuario" class="text-muted small"></span>
        <button id="btn-logout" class="btn btn-outline-secondary btn-sm" style="display:none">Cerrar sesión</button>
      </nav>
    </div>
  </header>

  <main class="container py-5">

    <!-- Estado: verificando si es admin -->
    <div id="status" class="mb-4"></div>

    <!-- Panel de admin (oculto hasta verificar) -->
    <div id="panel-admin" style="display:none">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h5 mb-0">Panel de administrador</h2>
      </div>

      <!-- Tabs para navegar entre secciones -->
      <ul class="nav nav-tabs mb-4" id="adminTabs">
        <li class="nav-item">
          <button class="nav-link active" onclick="mostrarTab('contactos')">
            📬 Contactos
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" onclick="mostrarTab('ordenes')">
            🛒 Órdenes
          </button>
        </li>
      </ul>

      <!-- CONTACTOS -->
      <section id="tab-contactos">
        <div class="bg-white p-4 rounded-4 shadow-sm">
          <h3 class="h6 mb-3 text-muted text-uppercase" style="letter-spacing:.08em">Mensajes de contacto</h3>
          <div id="lista-contactos">
            <p class="text-muted">Cargando mensajes…</p>
          </div>
        </div>
      </section>

      <!-- ÓRDENES -->
      <section id="tab-ordenes" style="display:none">
        <div class="bg-white p-4 rounded-4 shadow-sm">
          <h3 class="h6 mb-3 text-muted text-uppercase" style="letter-spacing:.08em">Todas las órdenes</h3>
          <div id="lista-ordenes">
            <p class="text-muted">Cargando órdenes…</p>
          </div>
        </div>
      </section>

    </div>

  </main>

  <footer class="bg-white border-top">
    <div class="container py-3 text-center text-muted">
      <small>© 2026 · Mi sitio</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/admin.js"></script>

</body>
</html>
